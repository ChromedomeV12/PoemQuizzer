services:
  mysql:
    image: mysql:8.0
    container_name: poemquizzer-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: poemquizzer
      MYSQL_DATABASE: poemquizzer
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - app-network

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    container_name: poemquizzer-server
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://root:poemquizzer@mysql:3306/poemquizzer
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-this-to-a-secure-random-string}
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app-network

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile.client
    container_name: poemquizzer-client
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - server
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: poemquizzer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - client
      - server
    networks:
      - app-network

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
